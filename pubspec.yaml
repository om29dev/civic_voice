name: civic_voice_interface
description: A voice-first decision-intelligence system for government service navigation.
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # UI & Core Animations
  lottie: ^2.3.2
  flutter_animate: ^4.1.1
  animate_do: ^3.0.2
  animated_text_kit: ^4.2.2
  shimmer: ^3.0.0
  confetti: ^0.7.0
  
  # Advanced Visual Effects
  glassmorphism: ^2.0.0
  
  # Design & Icons
  google_fonts: ^6.1.0
  font_awesome_flutter: ^10.5.0
  
  # Data Visualization
  syncfusion_flutter_charts: ^22.1.40
  syncfusion_flutter_gauges: ^22.1.40
  fl_chart: ^0.66.0
  
  # Functional
  provider: ^6.0.5
  speech_to_text: ^7.0.0
  flutter_tts: ^3.8.3
  countup: ^0.1.3
  url_launcher: ^6.2.2
  file_picker: ^8.1.3
  http: ^1.1.0
  flutter_dotenv: ^5.1.0
  shared_preferences: ^2.2.2
  image_picker: ^1.0.7
  image: ^4.1.3
  connectivity_plus: ^5.0.0
  flutter_local_notifications: ^17.2.1
  timezone: ^0.9.2
  geolocator: ^10.1.0


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/lottie/
    - assets/images/
    - assets/images/assistant_waving.png
    - assets/icons/
