type User {
  id: ID!
  email: String!
  name: String
  mobile: String
  language: String
  isGuest: Boolean
  createdAt: AWSDateTime
  updatedAt: AWSDateTime!
  owner: String
}

type UserDocument {
  id: ID!
  name: String!
  category: String!
  size: String!
  uploadDate: AWSDateTime!
  status: String!
  filePath: String
  isVerified: Boolean!
  verificationMessage: String
  expiryDate: AWSDateTime
  extractedText: String
  createdAt: AWSDateTime!
  updatedAt: AWSDateTime!
  owner: String
}

input ModelStringInput {
  ne: String
  eq: String
  le: String
  lt: String
  ge: String
  gt: String
  contains: String
  notContains: String
  between: [String]
  beginsWith: String
  attributeExists: Boolean
  attributeType: ModelAttributeTypes
  size: ModelSizeInput
}

input ModelIntInput {
  ne: Int
  eq: Int
  le: Int
  lt: Int
  ge: Int
  gt: Int
  between: [Int]
  attributeExists: Boolean
  attributeType: ModelAttributeTypes
}

input ModelFloatInput {
  ne: Float
  eq: Float
  le: Float
  lt: Float
  ge: Float
  gt: Float
  between: [Float]
  attributeExists: Boolean
  attributeType: ModelAttributeTypes
}

input ModelBooleanInput {
  ne: Boolean
  eq: Boolean
  attributeExists: Boolean
  attributeType: ModelAttributeTypes
}

input ModelIDInput {
  ne: ID
  eq: ID
  le: ID
  lt: ID
  ge: ID
  gt: ID
  contains: ID
  notContains: ID
  between: [ID]
  beginsWith: ID
  attributeExists: Boolean
  attributeType: ModelAttributeTypes
  size: ModelSizeInput
}

input ModelSubscriptionStringInput {
  ne: String
  eq: String
  le: String
  lt: String
  ge: String
  gt: String
  contains: String
  notContains: String
  between: [String]
  beginsWith: String
  in: [String]
  notIn: [String]
}

input ModelSubscriptionIntInput {
  ne: Int
  eq: Int
  le: Int
  lt: Int
  ge: Int
  gt: Int
  between: [Int]
  in: [Int]
  notIn: [Int]
}

input ModelSubscriptionFloatInput {
  ne: Float
  eq: Float
  le: Float
  lt: Float
  ge: Float
  gt: Float
  between: [Float]
  in: [Float]
  notIn: [Float]
}

input ModelSubscriptionBooleanInput {
  ne: Boolean
  eq: Boolean
}

input ModelSubscriptionIDInput {
  ne: ID
  eq: ID
  le: ID
  lt: ID
  ge: ID
  gt: ID
  contains: ID
  notContains: ID
  between: [ID]
  beginsWith: ID
  in: [ID]
  notIn: [ID]
}

enum ModelAttributeTypes {
  binary
  binarySet
  bool
  list
  map
  number
  numberSet
  string
  stringSet
  _null
}

input ModelSizeInput {
  ne: Int
  eq: Int
  le: Int
  lt: Int
  ge: Int
  gt: Int
  between: [Int]
}

enum ModelSortDirection {
  ASC
  DESC
}

type ModelUserConnection {
  items: [User]!
  nextToken: String
}

input ModelUserFilterInput {
  id: ModelIDInput
  email: ModelStringInput
  name: ModelStringInput
  mobile: ModelStringInput
  language: ModelStringInput
  isGuest: ModelBooleanInput
  createdAt: ModelStringInput
  updatedAt: ModelStringInput
  and: [ModelUserFilterInput]
  or: [ModelUserFilterInput]
  not: ModelUserFilterInput
  owner: ModelStringInput
}

type Query {
  getUser(id: ID!): User
  listUsers(filter: ModelUserFilterInput, limit: Int, nextToken: String): ModelUserConnection
  getUserDocument(id: ID!): UserDocument
  listUserDocuments(filter: ModelUserDocumentFilterInput, limit: Int, nextToken: String): ModelUserDocumentConnection
}

input ModelUserConditionInput {
  email: ModelStringInput
  name: ModelStringInput
  mobile: ModelStringInput
  language: ModelStringInput
  isGuest: ModelBooleanInput
  createdAt: ModelStringInput
  and: [ModelUserConditionInput]
  or: [ModelUserConditionInput]
  not: ModelUserConditionInput
  updatedAt: ModelStringInput
  owner: ModelStringInput
}

input CreateUserInput {
  id: ID
  email: String!
  name: String
  mobile: String
  language: String
  isGuest: Boolean
  createdAt: AWSDateTime
}

input UpdateUserInput {
  id: ID!
  email: String
  name: String
  mobile: String
  language: String
  isGuest: Boolean
  createdAt: AWSDateTime
}

input DeleteUserInput {
  id: ID!
}

type Mutation {
  createUser(input: CreateUserInput!, condition: ModelUserConditionInput): User
  updateUser(input: UpdateUserInput!, condition: ModelUserConditionInput): User
  deleteUser(input: DeleteUserInput!, condition: ModelUserConditionInput): User
  createUserDocument(input: CreateUserDocumentInput!, condition: ModelUserDocumentConditionInput): UserDocument
  updateUserDocument(input: UpdateUserDocumentInput!, condition: ModelUserDocumentConditionInput): UserDocument
  deleteUserDocument(input: DeleteUserDocumentInput!, condition: ModelUserDocumentConditionInput): UserDocument
}

input ModelSubscriptionUserFilterInput {
  id: ModelSubscriptionIDInput
  email: ModelSubscriptionStringInput
  name: ModelSubscriptionStringInput
  mobile: ModelSubscriptionStringInput
  language: ModelSubscriptionStringInput
  isGuest: ModelSubscriptionBooleanInput
  createdAt: ModelSubscriptionStringInput
  updatedAt: ModelSubscriptionStringInput
  and: [ModelSubscriptionUserFilterInput]
  or: [ModelSubscriptionUserFilterInput]
  owner: ModelStringInput
}

type Subscription {
  onCreateUser(filter: ModelSubscriptionUserFilterInput, owner: String): User @aws_subscribe(mutations: ["createUser"])
  onUpdateUser(filter: ModelSubscriptionUserFilterInput, owner: String): User @aws_subscribe(mutations: ["updateUser"])
  onDeleteUser(filter: ModelSubscriptionUserFilterInput, owner: String): User @aws_subscribe(mutations: ["deleteUser"])
  onCreateUserDocument(filter: ModelSubscriptionUserDocumentFilterInput, owner: String): UserDocument @aws_subscribe(mutations: ["createUserDocument"])
  onUpdateUserDocument(filter: ModelSubscriptionUserDocumentFilterInput, owner: String): UserDocument @aws_subscribe(mutations: ["updateUserDocument"])
  onDeleteUserDocument(filter: ModelSubscriptionUserDocumentFilterInput, owner: String): UserDocument @aws_subscribe(mutations: ["deleteUserDocument"])
}

type ModelUserDocumentConnection {
  items: [UserDocument]!
  nextToken: String
}

input ModelUserDocumentFilterInput {
  id: ModelIDInput
  name: ModelStringInput
  category: ModelStringInput
  size: ModelStringInput
  uploadDate: ModelStringInput
  status: ModelStringInput
  filePath: ModelStringInput
  isVerified: ModelBooleanInput
  verificationMessage: ModelStringInput
  expiryDate: ModelStringInput
  extractedText: ModelStringInput
  createdAt: ModelStringInput
  updatedAt: ModelStringInput
  and: [ModelUserDocumentFilterInput]
  or: [ModelUserDocumentFilterInput]
  not: ModelUserDocumentFilterInput
  owner: ModelStringInput
}

input ModelUserDocumentConditionInput {
  name: ModelStringInput
  category: ModelStringInput
  size: ModelStringInput
  uploadDate: ModelStringInput
  status: ModelStringInput
  filePath: ModelStringInput
  isVerified: ModelBooleanInput
  verificationMessage: ModelStringInput
  expiryDate: ModelStringInput
  extractedText: ModelStringInput
  and: [ModelUserDocumentConditionInput]
  or: [ModelUserDocumentConditionInput]
  not: ModelUserDocumentConditionInput
  createdAt: ModelStringInput
  updatedAt: ModelStringInput
  owner: ModelStringInput
}

input CreateUserDocumentInput {
  id: ID
  name: String!
  category: String!
  size: String!
  uploadDate: AWSDateTime!
  status: String!
  filePath: String
  isVerified: Boolean!
  verificationMessage: String
  expiryDate: AWSDateTime
  extractedText: String
}

input UpdateUserDocumentInput {
  id: ID!
  name: String
  category: String
  size: String
  uploadDate: AWSDateTime
  status: String
  filePath: String
  isVerified: Boolean
  verificationMessage: String
  expiryDate: AWSDateTime
  extractedText: String
}

input DeleteUserDocumentInput {
  id: ID!
}

input ModelSubscriptionUserDocumentFilterInput {
  id: ModelSubscriptionIDInput
  name: ModelSubscriptionStringInput
  category: ModelSubscriptionStringInput
  size: ModelSubscriptionStringInput
  uploadDate: ModelSubscriptionStringInput
  status: ModelSubscriptionStringInput
  filePath: ModelSubscriptionStringInput
  isVerified: ModelSubscriptionBooleanInput
  verificationMessage: ModelSubscriptionStringInput
  expiryDate: ModelSubscriptionStringInput
  extractedText: ModelSubscriptionStringInput
  createdAt: ModelSubscriptionStringInput
  updatedAt: ModelSubscriptionStringInput
  and: [ModelSubscriptionUserDocumentFilterInput]
  or: [ModelSubscriptionUserDocumentFilterInput]
  owner: ModelStringInput
}
